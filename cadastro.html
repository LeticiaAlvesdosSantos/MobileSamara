<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamaraAgenda - Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #93b4d7 0%, #6f9bce 50%, #4a7bb3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            top: 30px;
            bottom: 30px;
            left: 30px;
            right: 30px;
            border: 3px solid rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        .cadastro-container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        .cadastro-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .cadastro-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #4a7bb3;
            margin-bottom: 10px;
        }

        .cadastro-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2d2d2d;
            font-size: 0.9rem;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #93b4d7;
            font-size: 1.1rem;
        }

        .input-icon input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #ddd;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #6f9bce;
            box-shadow: 0 0 0 3px rgba(111, 155, 206, 0.1);
        }

        .btn-cadastro {
            width: 100%;
            padding: 15px;
            background: #4a7bb3;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0;
        }

        .btn-cadastro:hover {
            background: #6f9bce;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74, 123, 179, 0.3);
        }

        .btn-cadastro:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .cadastro-footer {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .cadastro-footer a {
            color: #4a7bb3;
            text-decoration: none;
            font-weight: 600;
        }

        .cadastro-footer a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4a7bb3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            display: none;
            font-size: 0.95rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
            display: none;
            font-size: 0.95rem;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .cadastro-container {
                padding: 30px 20px;
            }
            
            .cadastro-header h1 {
                font-size: 2rem;
            }
            
            body::before {
                top: 15px;
                bottom: 15px;
                left: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="cadastro-container">
        <div class="cadastro-header">
            <h1>SamaraAgenda</h1>
            <p>Crie sua conta gratuitamente</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="cadastroForm" onsubmit="handleCadastro(event)">
            <div class="form-group">
                <label>Nome Completo *</label>
                <div class="input-icon">
                    <i class="bi bi-person"></i>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>E-mail *</label>
                <div class="input-icon">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Telefone</label>
                <div class="input-icon">
                    <i class="bi bi-telephone"></i>
                    <input type="tel" id="telefone" placeholder="(11) 99999-9999">
                </div>
            </div>
            
            <div class="form-group">
                <label>Senha *</label>
                <div class="input-icon">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="senha" placeholder="Crie uma senha (mínimo 6 caracteres)" required minlength="6">
                </div>
            </div>
            
            <div class="form-group">
                <label>Confirmar Senha *</label>
                <div class="input-icon">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required minlength="6">
                </div>
            </div>
            
            <button type="submit" class="btn-cadastro" id="btnCadastro">Criar Conta</button>
            
            <div class="cadastro-footer">
                <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
            </div>
        </form>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    
    <script>
        window.onload = function() {
            const usuario = sessionStorage.getItem('usuario');
            if (usuario) {
                window.location.href = 'dashboard.html';
            }
        };

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('btnCadastro').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('btnCadastro').disabled = false;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 5000);
        }

        async function handleCadastro(event) {
            event.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            
            if (!nome || !email || !senha) {
                showError('Por favor, preencha todos os campos obrigatórios');
                return;
            }
            
            if (senha !== confirmarSenha) {
                showError('As senhas não coincidem');
                return;
            }
            
            if (senha.length < 6) {
                showError('A senha deve ter no mínimo 6 caracteres');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        nome, 
                        email, 
                        senha,
                        telefone 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showSuccess('Cadastro realizado com sucesso! Redirecionando...');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html?cadastro=sucesso';
                    }, 2000);
                } else {
                    showError(data.message || 'Erro ao realizar cadastro');
                    hideLoading();
                }
            } catch (error) {
                console.error('Erro:', error);
                
                if (error.message.includes('Failed to fetch')) {
                    showError('Erro de conexão: Verifique se o servidor está rodando (npm run dev)');
                } else {
                    showError('Erro: ' + error.message);
                }
                
                hideLoading();
            }
        }
    </script>
</body>
</html>
