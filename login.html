<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamaraAgenda - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #93b4d7 0%, #6f9bce 50%, #4a7bb3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            top: 30px;
            bottom: 30px;
            left: 30px;
            right: 30px;
            border: 3px solid rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #4a7bb3;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2d2d2d;
            font-size: 0.9rem;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #93b4d7;
            font-size: 1.1rem;
        }

        .input-icon input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #ddd;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #6f9bce;
            box-shadow: 0 0 0 3px rgba(111, 155, 206, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }

        .forgot a {
            color: #6f9bce;
            text-decoration: none;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #4a7bb3;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            background: #6f9bce;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74, 123, 179, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .login-footer a {
            color: #4a7bb3;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* REMOVIDO: .back-home */

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4a7bb3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            display: none;
            font-size: 0.95rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
            display: none;
            font-size: 0.95rem;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 2rem;
            }
            
            body::before {
                top: 15px;
                bottom: 15px;
                left: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>SamaraAgenda</h1>
            <p>Faça login para acessar o sistema</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="success-message" id="successMessage"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>E-mail</label>
                <div class="input-icon">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required autocomplete="email">
                </div>
            </div>
            
            <div class="form-group">
                <label>Senha</label>
                <div class="input-icon">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="senha" placeholder="Digite sua senha" required autocomplete="current-password">
                </div>
            </div>
            
            <div class="remember-forgot">
                <label class="remember">
                    <input type="checkbox" id="lembrar"> Lembrar-me
                </label>
                <div class="forgot">
                    <a href="#" onclick="alert('Função de recuperação de senha em desenvolvimento')">Esqueceu a senha?</a>
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin">Entrar no Sistema</button>
            
            <div class="login-footer">
                <p>Não tem uma conta? <a href="cadastro.html">Criar conta gratuita</a></p>
            </div>
        </form>
    </div>
    
    <!-- REMOVIDO: <div class="back-home"> ... </div> -->
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    
    <script>
        window.onload = function() {
            const usuario = sessionStorage.getItem('usuario');
            if (usuario) {
                window.location.href = 'dashboard.html';
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('cadastro') === 'sucesso') {
                showSuccess('Cadastro realizado com sucesso! Faça seu login.');
            }
            
            const savedEmail = localStorage.getItem('usuario_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('lembrar').checked = true;
            }
        };

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('btnLogin').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('btnLogin').disabled = false;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 5000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const lembrar = document.getElementById('lembrar').checked;
            
            if (!email || !senha) {
                showError('Por favor, preencha todos os campos');
                return;
            }
            
            showLoading();
            
            try {
                console.log('Enviando login para:', email);
                
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email: email, 
                        senha: senha 
                    })
                });
                
                console.log('Status da resposta:', response.status);
                
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    console.error('Erro ao parsear resposta:', e);
                    throw new Error('Resposta inválida do servidor');
                }
                
                console.log('Dados recebidos:', data);
                
                if (response.ok && data.success) {
                    sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    if (lembrar) {
                        localStorage.setItem('usuario_email', email);
                    } else {
                        localStorage.removeItem('usuario_email');
                    }
                    
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.message || 'Erro ao fazer login');
                    hideLoading();
                }
            } catch (error) {
                console.error('Erro detalhado:', error);
                
                if (error.message.includes('Failed to fetch')) {
                    showError('Erro de conexão: Verifique se o servidor está rodando (npm run dev)');
                } else {
                    showError('Erro: ' + error.message);
                }
                
                hideLoading();
            }
        }

        window.preencherTeste = function() {
            document.getElementById('email').value = 'teste@email.com';
            document.getElementById('senha').value = '123456';
            document.getElementById('lembrar').checked = true;
        };
    </script>
</body>
</html>
